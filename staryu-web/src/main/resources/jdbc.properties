# ========== 数据库连接配置 ==========
# 默认使用本地 MySQL，可通过环境变量覆盖：
#   MYSQL_URL=mysql://user:password@host:port/dbname
#   PGDATABASE_URL=postgresql://user:password@host:port/dbname

# MySQL 默认配置
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/staryu_farm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
db.username=root
db.password=123456

# Druid 连接池
db.initialSize=2
db.minIdle=2
db.maxActive=20
db.maxWait=60000
db.timeBetweenEvictionRunsMillis=60000
db.minEvictableIdleTimeMillis=300000
db.validationQuery=SELECT 1

# ========== MinIO 对象存储配置 ==========
# 可通过环境变量覆盖
minio.endpoint=http://8.141.29.206:19000
minio.accessKey=minioadmin
minio.secretKey=minioadmin
minio.bucket=staryu

# Hibernate
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=false
hibernate.format_sql=true
