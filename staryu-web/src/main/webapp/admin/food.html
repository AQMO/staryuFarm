<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语农庄 - 菜品管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #304156; color: #fff; position: fixed; top: 0; bottom: 0; overflow-y: auto; }
        .sidebar .logo { padding: 20px; font-size: 18px; font-weight: bold; text-align: center; border-bottom: 1px solid #3a4a5e; }
        .sidebar .logo span { color: #67c23a; }
        .sidebar .menu-item { display: block; padding: 14px 20px; color: #bfcbd9; text-decoration: none; font-size: 14px; transition: all .3s; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { background: #263445; color: #409eff; }
        .main-content { margin-left: 220px; flex: 1; }
        .header { background: #fff; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,21,41,.08); }
        .header h2 { margin: 0; font-size: 18px; color: #303133; }
        .content { padding: 24px; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <div class="sidebar">
            <div class="logo"><span>星语</span>农庄</div>
            <a v-for="menu in sidebarMenus" :key="menu.id"
               :href="menu.url" :class="['menu-item', currentMenu === menu.menuKey ? 'active' : '']">
               {{ menu.icon }} {{ menu.name }}
            </a>
        </div>
        <div class="main-content">
            <div class="header"><h2>菜品管理</h2></div>
            <div class="content">
                <div style="margin-bottom:16px">
                    <el-button type="primary" @click="handleAddFood">新增菜品</el-button>
                    <el-button @click="showCategoryDialog">管理分类</el-button>
                </div>
                <el-table :data="list" border stripe>
                    <el-table-column prop="id" label="ID" width="60"></el-table-column>
                    <el-table-column prop="name" label="菜品名称" width="150"></el-table-column>
                    <el-table-column prop="categoryName" label="分类" width="100"></el-table-column>
                    <el-table-column prop="price" label="价格(元)" width="100"></el-table-column>
                    <el-table-column label="状态" width="80">
                        <template slot-scope="s"><el-tag :type="s.row.status===1?'success':'danger'">{{s.row.status===1?'上架':'下架'}}</el-tag></template>
                    </el-table-column>
                    <el-table-column prop="description" label="描述" show-overflow-tooltip></el-table-column>
                    <el-table-column label="操作" width="160">
                        <template slot-scope="s">
                            <el-button size="mini" @click="handleEdit(s.row)">编辑</el-button>
                            <el-button size="mini" type="danger" @click="handleDelete(s.row)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>

                <!-- 分类管理弹窗 -->
                <el-dialog title="分类管理" :visible.sync="catDialogVisible">
                    <el-button size="small" @click="addCategory" style="margin-bottom:12px">新增分类</el-button>
                    <el-table :data="categories" border size="small">
                        <el-table-column prop="id" label="ID" width="60"></el-table-column>
                        <el-table-column prop="name" label="分类名称">
                            <template slot-scope="s"><el-input v-model="s.row.name" size="small"></el-input></template>
                        </el-table-column>
                        <el-table-column prop="sort" label="排序" width="100">
                            <template slot-scope="s"><el-input-number v-model="s.row.sort" :min="0" size="small"></el-input-number></template>
                        </el-table-column>
                        <el-table-column label="操作" width="120">
                            <template slot-scope="s">
                                <el-button size="mini" @click="saveCategory(s.row)">保存</el-button>
                                <el-button size="mini" type="danger" @click="deleteCategory(s.row)">删除</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                </el-dialog>

                <!-- 菜品编辑弹窗 -->
                <el-dialog :title="dialogTitle" :visible.sync="dialogVisible">
                    <el-form :model="form" label-width="100px">
                        <el-form-item label="菜品名称"><el-input v-model="form.name"></el-input></el-form-item>
                        <el-form-item label="分类">
                            <el-select v-model="form.categoryId" placeholder="请选择">
                                <el-option v-for="c in categories" :key="c.id" :label="c.name" :value="c.id"></el-option>
                            </el-select>
                        </el-form-item>
                        <el-form-item label="价格"><el-input-number v-model="form.price" :min="0"></el-input-number></el-form-item>
                        <el-form-item label="图片URL"><el-input v-model="form.pic"></el-input></el-form-item>
                        <el-form-item label="描述"><el-input type="textarea" v-model="form.description"></el-input></el-form-item>
                        <el-form-item label="状态"><el-switch v-model="form.status" :active-value="1" :inactive-value="0"></el-switch></el-form-item>
                    </el-form>
                    <span slot="footer">
                        <el-button @click="dialogVisible=false">取消</el-button>
                        <el-button type="primary" @click="saveForm">保存</el-button>
                    </span>
                </el-dialog>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/jquery@3/dist/jquery.min.js"></script>
<script src="/static/js/admin-common.js"></script>
<script>
new Vue({
    el: '#app',
    data() {
        return {
            currentMenu: \'food',
            sidebarMenus: [],
            list: [], categories: [], dialogVisible: false, catDialogVisible: false,
            dialogTitle: '新增菜品',
            form: { name:'', categoryId:null, price:0, pic:'', description:'', status:1 }
        };
    },
    created() { this.loadSidebar(); this.loadList(); this.loadCategories(); },
    methods: {
        
        loadSidebar() {
            $.getJSON('/api/menus/tree', (d) => {
                this.sidebarMenus = d.data || [];
            });
        },loadList() { $.getJSON('/api/food', d => { this.list = (d.data||[]).map(f => { f.categoryName = (this.categories.find(c=>c.id===f.categoryId)||{}).name||'-'; return f; }); }); },
        loadCategories() { $.getJSON('/api/food-category', d => { this.categories = d.data || []; this.loadList(); }); },
        resetForm() { this.form = { name:'', categoryId:null, price:0, pic:'', description:'', status:1 }; },
        handleAddFood() { this.resetForm(); this.dialogTitle = '新增菜品'; this.dialogVisible = true; },
        handleEdit(row) { this.form = JSON.parse(JSON.stringify(row)); this.dialogTitle = '编辑菜品'; this.dialogVisible = true; },
        saveForm() {
            const isEdit = !!this.form.id;
            $.ajax({ url: isEdit ? '/api/food/' + this.form.id : '/api/food', method: isEdit ? 'PUT' : 'POST', contentType: 'application/json', data: JSON.stringify(this.form), success: () => { this.$message.success('保存成功'); this.dialogVisible = false; this.loadList(); }, error: () => { this.$message.error('保存失败'); } });
        },
        handleDelete(row) {
            this.$confirm('确认删除?', '提示', { type: 'warning' }).then(() => {
                $.ajax({ url: '/api/food/' + row.id, method: 'DELETE', success: () => { this.$message.success('删除成功'); this.loadList(); } });
            }).catch(()=>{});
        },
        showCategoryDialog() { this.catDialogVisible = true; },
        addCategory() { this.categories.push({ name: '', sort: 0 }); },
        saveCategory(c) {
            const isEdit = !!c.id;
            $.ajax({ url: isEdit ? '/api/food-category/' + c.id : '/api/food-category', method: isEdit ? 'PUT' : 'POST', contentType: 'application/json', data: JSON.stringify(c), success: () => { this.$message.success('保存成功'); this.loadCategories(); }, error: () => { this.$message.error('保存失败'); } });
        },
        deleteCategory(c) {
            if (!c.id) { this.categories = this.categories.filter(x=>x!==c); return; }
            this.$confirm('确认删除分类?', '提示', { type: 'warning' }).then(() => {
                $.ajax({ url: '/api/food-category/' + c.id, method: 'DELETE', success: () => { this.$message.success('删除成功'); this.loadCategories(); } });
            }).catch(()=>{});
        }
    }
});
</script>
</body>
</html>
