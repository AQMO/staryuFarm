<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语农庄 - 权限配置</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #304156; color: #fff; position: fixed; top: 0; bottom: 0; overflow-y: auto; }
        .sidebar .logo { padding: 20px; font-size: 18px; font-weight: bold; text-align: center; border-bottom: 1px solid #3a4a5e; }
        .sidebar .logo span { color: #67c23a; }
        .sidebar .menu-item { display: block; padding: 14px 20px; color: #bfcbd9; text-decoration: none; font-size: 14px; transition: all .3s; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { background: #263445; color: #409eff; }
        .main-content { margin-left: 220px; flex: 1; }
        .header { background: #fff; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,21,41,.08); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 18px; color: #303133; }
        .header .user-info { display: flex; align-items: center; gap: 16px; color: #909399; font-size: 14px; }
        .content { padding: 24px; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <div class="sidebar">
            <div class="logo"><span>星语</span>农庄</div>
            <a v-for="menu in sidebarMenus" :key="menu.id"
               :href="menu.url" :class="['menu-item', currentMenu === menu.menuKey ? 'active' : '']">
               {{ menu.icon }} {{ menu.name }}
            </a>
        </div>
        <div class="main-content">
            <div class="header">
                <h2>权限配置</h2>
                <div class="user-info">
                    <span>{{ adminName }}</span>
                    <el-button size="mini" type="text" @click="logout">退出登录</el-button>
                </div>
            </div>
            <div class="content">
                <el-card>
                    <div slot="header"><span>角色权限配置</span></div>
                    <el-tabs v-model="activeRole" @tab-click="onRoleChange">
                        <el-tab-pane v-for="role in roles" :key="role.key" :label="role.name" :name="role.key"></el-tab-pane>
                    </el-tabs>
                    <div v-if="activeRole" style="margin-top: 16px;">
                        <p style="margin-top:0;color:#909399;">勾选当前角色可访问的菜单：</p>
                        <el-checkbox-group v-model="checkedMenuIds">
                            <div v-for="menu in allMenus" :key="menu.id" style="margin-bottom: 10px;">
                                <el-checkbox :label="menu.id">
                                    {{ menu.icon }} {{ menu.name }}
                                    <span style="color:#c0c4cc;font-size:12px;margin-left:4px">{{ menu.url }}</span>
                                </el-checkbox>
                            </div>
                        </el-checkbox-group>
                        <div style="margin-top: 20px;">
                            <el-button type="primary" @click="savePermission">保存权限</el-button>
                        </div>
                    </div>
                </el-card>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/jquery@3/dist/jquery.min.js"></script>
<script src="/static/js/admin-common.js"></script>
<script>
new Vue({
    el: '#app',
    data() {
        return {
            currentMenu: 'permission',
            sidebarMenus: [],
            adminName: '管理员',
            roles: [
                { key: 'admin', name: '管理员' },
                { key: 'operator', name: '运营人员' },
                { key: 'user', name: '普通用户' }
            ],
            activeRole: 'admin',
            allMenus: [],
            checkedMenuIds: []
        };
    },
    created() {
        initAdminPage(this, 'permission');
        this.loadMenus();
    },
    methods: {
        logout: adminLogout,
        loadMenus() {
            $.getJSON('/api/menus/list', (d) => {
                this.allMenus = d.data || [];
                this.loadPermission();
            });
        },
        loadPermission() {
            if (!this.activeRole) return;
            $.getJSON('/api/menus/role/' + this.activeRole, (d) => {
                // d.data 是 menuId 数组
                this.checkedMenuIds = d.data || [];
            });
        },
        onRoleChange() {
            this.loadPermission();
        },
        savePermission() {
            $.ajax({
                url: '/api/menus/role/' + this.activeRole,
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ menuIds: this.checkedMenuIds }),
                success: (res) => {
                    if (res.error) { this.$message.error(res.error); return; }
                    this.$message.success('权限保存成功');
                },
                error: () => { this.$message.error('保存失败'); }
            });
        }
    }
});
</script>
</body>
</html>
