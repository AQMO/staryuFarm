<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语农庄 - 农产品管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #304156; color: #fff; position: fixed; top: 0; bottom: 0; overflow-y: auto; }
        .sidebar .logo { padding: 20px; font-size: 18px; font-weight: bold; text-align: center; border-bottom: 1px solid #3a4a5e; }
        .sidebar .logo span { color: #67c23a; }
        .sidebar .menu-item { display: block; padding: 14px 20px; color: #bfcbd9; text-decoration: none; font-size: 14px; transition: all .3s; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { background: #263445; color: #409eff; }
        .main-content { margin-left: 220px; flex: 1; }
        .header { background: #fff; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,21,41,.08); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 18px; color: #303133; }
        .header .user-info { display: flex; align-items: center; gap: 16px; color: #909399; font-size: 14px; }
        .content { padding: 24px; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <div class="sidebar">
            <div class="logo"><span>星语</span>农庄</div>
            <a v-for="menu in sidebarMenus" :key="menu.id"
               :href="menu.url" :class="['menu-item', currentMenu === menu.menuKey ? 'active' : '']">
               {{ menu.icon }} {{ menu.name }}
            </a>
        </div>
        <div class="main-content">
            <div class="header">
                <h2>农产品管理</h2>
                <div class="user-info">
                    <span>{{ adminName }}</span>
                    <el-button size="mini" type="text" @click="logout">退出登录</el-button>
                </div>
            </div>
            <div class="content">
                <div style="margin-bottom:16px">
                    <el-button type="primary" @click="handleAdd">新增产品</el-button>
                    <el-button @click="showCatDialog">管理分类</el-button>
                </div>
                <el-table :data="list" border stripe>
                    <el-table-column prop="id" label="ID" width="60"></el-table-column>
                    <el-table-column prop="name" label="产品名称" width="150"></el-table-column>
                    <el-table-column prop="categoryName" label="分类" width="100"></el-table-column>
                    <el-table-column prop="price" label="价格(元)" width="100"></el-table-column>
                    <el-table-column prop="unit" label="单位" width="80"></el-table-column>
                    <el-table-column prop="stock" label="库存" width="80"></el-table-column>
                    <el-table-column label="状态" width="80">
                        <template slot-scope="s"><el-tag :type="s.row.status===1?'success':'danger'">{{s.row.status===1?'上架':'下架'}}</el-tag></template>
                    </el-table-column>
                    <el-table-column label="操作" width="160">
                        <template slot-scope="s">
                            <el-button size="mini" @click="handleEdit(s.row)">编辑</el-button>
                            <el-button size="mini" type="danger" @click="handleDelete(s.row)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>

                <el-dialog title="分类管理" :visible.sync="catDialogVisible">
                    <el-button size="small" @click="addCat" style="margin-bottom:12px">新增分类</el-button>
                    <el-table :data="cats" border size="small">
                        <el-table-column prop="id" label="ID" width="60"></el-table-column>
                        <el-table-column prop="name" label="分类名称"><template slot-scope="s"><el-input v-model="s.row.name" size="small"></el-input></template></el-table-column>
                        <el-table-column label="操作" width="120">
                            <template slot-scope="s">
                                <el-button size="mini" @click="saveCat(s.row)">保存</el-button>
                                <el-button size="mini" type="danger" @click="delCat(s.row)">删除</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                </el-dialog>

                <el-dialog :title="dialogTitle" :visible.sync="dialogVisible">
                    <el-form :model="form" label-width="100px">
                        <el-form-item label="产品名称"><el-input v-model="form.name"></el-input></el-form-item>
                        <el-form-item label="分类"><el-select v-model="form.categoryId"><el-option v-for="c in cats" :key="c.id" :label="c.name" :value="c.id"></el-option></el-select></el-form-item>
                        <el-form-item label="价格"><el-input-number v-model="form.price" :min="0"></el-input-number></el-form-item>
                        <el-form-item label="单位"><el-input v-model="form.unit"></el-input></el-form-item>
                        <el-form-item label="库存"><el-input-number v-model="form.stock" :min="0"></el-input-number></el-form-item>
                        <el-form-item label="图片URL"><el-input v-model="form.pic"></el-input></el-form-item>
                        <el-form-item label="描述"><el-input type="textarea" v-model="form.description"></el-input></el-form-item>
                        <el-form-item label="状态"><el-switch v-model="form.status" :active-value="1" :inactive-value="0"></el-switch></el-form-item>
                    </el-form>
                    <span slot="footer"><el-button @click="dialogVisible=false">取消</el-button><el-button type="primary" @click="saveForm">保存</el-button></span>
                </el-dialog>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/jquery@3/dist/jquery.min.js"></script>
<script src="/static/js/admin-common.js"></script>
<script>
new Vue({
    el: '#app',
    data() { return {
            currentMenu: 'products',
            sidebarMenus: [], adminName: '管理员', list:[], cats:[], dialogVisible:false, catDialogVisible:false, dialogTitle:'新增产品', form:{name:'',categoryId:null,price:0,unit:'斤',stock:0,pic:'',description:'',status:1} }; },
    created() { initAdminPage(this, 'products'); this.loadCats(); },
    methods: {
        logout: adminLogout,loadCats() { $.getJSON('/api/product-category', d => { this.cats = d.data||[]; this.loadList(); }); },
        loadList() { $.getJSON('/api/products', d => { this.list = (d.data||[]).map(p => { p.categoryName=(this.cats.find(c=>c.id===p.categoryId)||{}).name||'-'; return p; }); }); },
        resetForm() { this.form = {name:'',categoryId:null,price:0,unit:'斤',stock:0,pic:'',description:'',status:1}; },
        handleAdd() { this.resetForm(); this.dialogTitle='新增产品'; this.dialogVisible=true; },
        handleEdit(r) { this.form=JSON.parse(JSON.stringify(r)); this.dialogTitle='编辑产品'; this.dialogVisible=true; },
        saveForm() { const e=!!this.form.id; $.ajax({url:e?'/api/products/'+this.form.id:'/api/products',method:e?'PUT':'POST',contentType:'application/json',data:JSON.stringify(this.form),success:()=>{this.$message.success('保存成功');this.dialogVisible=false;this.loadList();},error:()=>{this.$message.error('保存失败');}}); },
        handleDelete(r) { this.$confirm('确认删除?','提示',{type:'warning'}).then(()=>{$.ajax({url:'/api/products/'+r.id,method:'DELETE',success:()=>{this.$message.success('删除成功');this.loadList();}});}).catch(()=>{}); },
        showCatDialog() { this.catDialogVisible=true; },
        addCat() { this.cats.push({name:''}); },
        saveCat(c) { const e=!!c.id; $.ajax({url:e?'/api/product-category/'+c.id:'/api/product-category',method:e?'PUT':'POST',contentType:'application/json',data:JSON.stringify(c),success:()=>{this.$message.success('保存成功');this.loadCats();},error:()=>{this.$message.error('保存失败');}}); },
        delCat(c) { if(!c.id){this.cats=this.cats.filter(x=>x!==c);return;} this.$confirm('确认删除?','提示',{type:'warning'}).then(()=>{$.ajax({url:'/api/product-category/'+c.id,method:'DELETE',success:()=>{this.$message.success('删除成功');this.loadCats();}});}).catch(()=>{}); }
    }
});
</script>
</body>
</html>
