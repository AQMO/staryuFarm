<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语农庄 - 菜单管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #304156; color: #fff; position: fixed; top: 0; bottom: 0; overflow-y: auto; }
        .sidebar .logo { padding: 20px; font-size: 18px; font-weight: bold; text-align: center; border-bottom: 1px solid #3a4a5e; }
        .sidebar .logo span { color: #67c23a; }
        .sidebar .menu-item { display: block; padding: 14px 20px; color: #bfcbd9; text-decoration: none; font-size: 14px; transition: all .3s; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { background: #263445; color: #409eff; }
        .main-content { margin-left: 220px; flex: 1; }
        .header { background: #fff; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,21,41,.08); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 18px; color: #303133; }
        .header .user-info { display: flex; align-items: center; gap: 16px; color: #909399; font-size: 14px; }
        .content { padding: 24px; }
        .toolbar { margin-bottom: 16px; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <div class="sidebar">
            <div class="logo"><span>星语</span>农庄</div>
            <a v-for="menu in sidebarMenus" :key="menu.id"
               :href="menu.url" :class="['menu-item', currentMenu === menu.menuKey ? 'active' : '']">
               {{ menu.icon }} {{ menu.name }}
            </a>
        </div>
        <div class="main-content">
            <div class="header">
                <h2>菜单管理</h2>
                <div class="user-info">
                    <span>{{ adminName }}</span>
                    <el-button size="mini" type="text" @click="logout">退出登录</el-button>
                </div>
            </div>
            <div class="content">
                <div class="toolbar">
                    <el-button type="primary" @click="handleAdd">新增菜单</el-button>
                </div>
                <el-table :data="menus" border stripe style="width: 100%">
                    <el-table-column prop="id" label="ID" width="60"></el-table-column>
                    <el-table-column prop="name" label="菜单名称" width="140"></el-table-column>
                    <el-table-column prop="menuKey" label="菜单标识" width="120"></el-table-column>
                    <el-table-column prop="url" label="路由路径" width="180"></el-table-column>
                    <el-table-column prop="icon" label="图标" width="100">
                        <template slot-scope="scope">
                            {{ scope.row.icon }}
                        </template>
                    </el-table-column>
                    <el-table-column prop="sortOrder" label="排序" width="70"></el-table-column>
                    <el-table-column label="可见" width="80">
                        <template slot-scope="scope">
                            <el-tag :type="scope.row.isVisible === 1 ? 'success' : 'danger'" size="mini">
                                {{ scope.row.isVisible === 1 ? '显示' : '隐藏' }}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="createdAt" label="创建时间" width="160"></el-table-column>
                    <el-table-column label="操作" width="150">
                        <template slot-scope="scope">
                            <el-button size="mini" @click="handleEdit(scope.row)">编辑</el-button>
                            <el-button size="mini" type="danger" @click="handleDelete(scope.row)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>

                <!-- 新增/编辑弹窗 -->
                <el-dialog :title="dialogTitle" :visible.sync="dialogVisible" width="500px">
                    <el-form :model="form" label-width="80px">
                        <el-form-item label="菜单名称">
                            <el-input v-model="form.name" placeholder="如：房间管理"></el-input>
                        </el-form-item>
                        <el-form-item label="菜单标识">
                            <el-input v-model="form.menuKey" placeholder="如：rooms（英文，唯一标识）"></el-input>
                        </el-form-item>
                        <el-form-item label="路由路径">
                            <el-input v-model="form.url" placeholder="如：/admin/rooms"></el-input>
                        </el-form-item>
                        <el-form-item label="图标">
                            <el-input v-model="form.icon" placeholder="如：🏠 或 el-icon-house"></el-input>
                        </el-form-item>
                        <el-form-item label="排序">
                            <el-input-number v-model="form.sortOrder" :min="0" :max="999"></el-input-number>
                        </el-form-item>
                        <el-form-item label="是否可见">
                            <el-switch v-model="form.isVisible" :active-value="1" :inactive-value="0" active-text="显示" inactive-text="隐藏"></el-switch>
                        </el-form-item>
                    </el-form>
                    <span slot="footer">
                        <el-button @click="dialogVisible = false">取消</el-button>
                        <el-button type="primary" @click="saveMenu">保存</el-button>
                    </span>
                </el-dialog>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/jquery@3/dist/jquery.min.js"></script>
<script src="/static/js/admin-common.js"></script>
<script>
new Vue({
    el: '#app',
    data() {
        return {
            currentMenu: 'menu',
            sidebarMenus: [],
            adminName: '管理员',
            menus: [],
            dialogVisible: false,
            dialogTitle: '新增菜单',
            form: { name: '', menuKey: '', url: '', icon: '', sortOrder: 0, isVisible: 1 }
        };
    },
    created() {
        initAdminPage(this, 'menu');
        this.loadMenus();
    },
    methods: {
        logout: adminLogout,
        loadMenus() {
            $.getJSON('/api/menus/list', (d) => {
                this.menus = d.data || [];
            });
        },
        handleAdd() {
            this.dialogTitle = '新增菜单';
            this.form = { name: '', menuKey: '', url: '', icon: '', sortOrder: 0, isVisible: 1 };
            this.dialogVisible = true;
        },
        handleEdit(row) {
            this.dialogTitle = '编辑菜单';
            this.form = JSON.parse(JSON.stringify(row));
            this.dialogVisible = true;
        },
        saveMenu() {
            if (!this.form.name) { this.$message.warning('请输入菜单名称'); return; }
            if (!this.form.menuKey) { this.$message.warning('请输入菜单标识'); return; }
            $.ajax({
                url: '/api/menus/save',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(this.form),
                success: (res) => {
                    if (res.error) { this.$message.error(res.error); return; }
                    this.$message.success('保存成功');
                    this.dialogVisible = false;
                    this.loadMenus();
                },
                error: () => { this.$message.error('保存失败'); }
            });
        },
        handleDelete(row) {
            this.$confirm('确定删除菜单「' + row.name + '」？删除后相关权限配置也会清除。', '提示', {
                confirmButtonText: '确定', cancelButtonText: '取消', type: 'warning'
            }).then(() => {
                $.ajax({
                    url: '/api/menus/' + row.id,
                    method: 'DELETE',
                    success: (res) => {
                        if (res.error) { this.$message.error(res.error); return; }
                        this.$message.success('删除成功');
                        this.loadMenus();
                    }
                });
            }).catch(() => {});
        }
    }
});
</script>
</body>
</html>
